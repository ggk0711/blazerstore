<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
   const firebaseConfig = {
  apiKey: "AIzaSyD6Y17O72tr0hLRcKw9q8NQHbjnCK9RUeo",
  authDomain: "blazerstore-d42ab.firebaseapp.com",
  projectId: "blazerstore-d42ab",
  storageBucket: "blazerstore-d42ab.firebasestorage.app",
  messagingSenderId: "100041581747",
  appId: "1:100041581747:web:badd8c029a3053589dbcc6",
  measurementId: "G-BTQ7MCLXMF"
};

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let senhaAdmin = localStorage.getItem('site_pass') || "0710";
    let produtos = [];
    let carrinho = [];
    let imgBase64 = "";

    // 2. ESCUTAR MUDANÇAS NO BANCO DE DADOS (Funciona para todos os usuários)
    db.ref('produtos').on('value', (snapshot) => {
        const data = snapshot.val();
        produtos = data ? Object.values(data) : [];
        renderLoja();
    });

    // Função para Adicionar no Firebase (Substitui o localStorage)
    function addProduto() {
        const nome = document.getElementById('new-nome').value;
        const preco = parseFloat(document.getElementById('new-preco').value);
        const urlImg = document.getElementById('new-img-url').value;
        const finalImg = imgBase64 || urlImg || "https://minecraft.wiki/images/Blaze_Rod_JE2_BE2.png";

        if(nome && preco) {
            const novoItemRef = db.ref('produtos').push();
            novoItemRef.set({
                id: novoItemRef.key, // ID único do Firebase
                nome: nome,
                preco: preco,
                img: finalImg
            }).then(() => {
                imgBase64 = "";
                document.getElementById('img-preview').style.display = "none";
                alert("Produto salvo na nuvem para todos!");
            });
        }
    }

    // Função para Excluir do Firebase
    function excluirItem(id) {
        // Encontra a chave do item no Firebase baseada no ID
        db.ref('produtos').once('value', snapshot => {
            snapshot.forEach(child => {
                if(child.val().id === id) {
                    child.ref.remove();
                }
            });
        });
    }

    // --- Configuração da DropZone (Mantida) ---
    const fileInput = document.getElementById('fileInput');
    const imgPreview = document.getElementById('img-preview');
    const dropZone = document.getElementById('dropZone');

    window.addEventListener("dragover", e => e.preventDefault(), false);
    window.addEventListener("drop", e => e.preventDefault(), false);
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("drop", e => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = e => {
                imgBase64 = e.target.result;
                imgPreview.src = imgBase64;
                imgPreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    }

    // --- Funções de Interface ---
    function renderLoja() {
        const lista = document.getElementById('produtos-lista');
        lista.innerHTML = '';
        produtos.forEach(p => {
            lista.innerHTML += `
                <div class="produto-card">
                    <img src="${p.img}" alt="${p.nome}">
                    <h3 style="color:var(--gold)">${p.nome}</h3>
                    <p style="font-weight: bold; color: var(--lava)">R$ ${p.preco.toFixed(2)}</p>
                    <button onclick="addAoCarrinho('${p.id}')">COMPRAR ITEM</button>
                </div>
            `;
        });
        renderAdminList();
    }

    function renderAdminList() {
        const lista = document.getElementById('admin-lista-itens');
        lista.innerHTML = '<h4>Gerenciar Nuvem</h4>';
        produtos.forEach(p => {
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; background:#111; padding:8px; margin-bottom:5px;">
                <span>${p.nome}</span> <button onclick="excluirItem('${p.id}')" style="width:auto; background:red; font-size:10px;">EXCLUIR</button>
            </div>`;
        });
    }

    function abrirLogin() { document.getElementById('modal-login').style.display = 'block'; }
    function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function verificarLogin() {
        if(document.getElementById('login-pass').value === senhaAdmin) {
            fecharModais();
            document.getElementById('panel-admin').style.display = 'block';
        } else { alert("Senha Incorreta!"); }
    }

    function addAoCarrinho(id) {
        const p = produtos.find(item => item.id === id);
        carrinho.push({...p, cartId: Date.now()});
        atualizarCarrinho();
        document.getElementById('carrinho-side').style.display = 'flex';
    }

    function atualizarCarrinho() {
        const lista = document.getElementById('itens-carrinho');
        let total = 0; lista.innerHTML = '';
        carrinho.forEach(item => {
            total += item.preco;
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(0,0,0,0.3); margin-bottom:5px; align-items:center;">
                <span style="font-size:12px;">${item.nome}</span>
                <button onclick="removerItem(${item.cartId})" style="width:auto; padding:2px 8px; background:red;">X</button>
            </div>`;
        });
        document.getElementById('total-carrinho').innerText = total.toFixed(2);
        document.getElementById('count-carrinho').innerText = carrinho.length;
    }

    function removerItem(cartId) {
        carrinho = carrinho.filter(i => i.cartId !== cartId);
        atualizarCarrinho();
    }

    function finalizarPedido() {
        if(carrinho.length === 0) return;
        let msg = "oi, finalizei meu carrinho no seu site.\n\n";
        carrinho.forEach(i => msg += `- ${i.nome}\n`);
        msg += `\n*TOTAL: R$ ${document.getElementById('total-carrinho').innerText}*`;
        window.open(`https://wa.me/5521970808960?text=${encodeURIComponent(msg)}`);
    }

    function toggleCarrinho() {
        const side = document.getElementById('carrinho-side');
        side.style.display = (side.style.display === 'flex') ? 'none' : 'flex';
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }
</script>
